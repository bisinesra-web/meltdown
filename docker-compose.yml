services:
  backend:
    image: ghcr.io/notaproton/meltdown-backend:latest
    restart: unless-stopped
    environment:
      PORT: "3000"
      CLIENT_ORIGIN: "https://${DOMAIN}"
      DATA_DIR: /data
    volumes:
      - sqlite_data:/data
    networks:
      - internal

  frontend:
    image: ghcr.io/notaproton/meltdown-frontend:latest
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - internal

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Run manually: docker compose run --rm certbot certonly --webroot ...
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'

volumes:
  sqlite_data:
  certbot_conf:
  certbot_www:

networks:
  internal:
