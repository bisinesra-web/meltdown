services:
  backend:
    image: ghcr.io/bisinesra-web/meltdown-backend:latest
    restart: unless-stopped
    environment:
      PORT: "3000"
      CLIENT_ORIGIN: "https://${DOMAIN}"
      DATA_DIR: /data
    volumes:
      - sqlite_data:/data
    networks:
      - internal

  frontend:
    image: ghcr.io/bisinesra-web/meltdown-frontend:latest
    restart: unless-stopped
    networks:
      - internal

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: "${DOMAIN}"
    depends_on:
      - backend
      - frontend
    networks:
      - internal

volumes:
  sqlite_data:
  caddy_data:
  caddy_config:

networks:
  internal:
